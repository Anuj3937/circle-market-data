name: Daily Market Data Update

# Run everyday at 02:00 UTC (Adjust if you prefer a different time)
on:
  schedule:
    - cron: '0 2 * * *'
  # This line allows you to trigger it manually from the GitHub Actions tab!
  workflow_dispatch: 

permissions:
  contents: write # Allows the action to commit and push code back to the repo

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Fetch Latest Market Data
        run: node update_daily_data.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.json
          # This checks if there are actual changes before committing to prevent errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update rolling 90-day market data" && git push)